<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found – Janaushadhi Store</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #064e3b 0%, #065f46 50%, #16a34a 100%);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      text-align: center; padding: 24px;
    }
    .container {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 28px;
      padding: 60px 48px;
      max-width: 520px;
      width: 100%;
      animation: fadeIn 0.6s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .icon { font-size: 72px; margin-bottom: 24px; }
    h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 80px; font-weight: 800;
      color: #4ade80; line-height: 1;
      margin-bottom: 8px;
    }
    h2 {
      font-family: 'Poppins', sans-serif;
      font-size: 22px; font-weight: 700;
      color: white; margin-bottom: 14px;
    }
    p { font-size: 15px; color: rgba(255,255,255,0.75); line-height: 1.7; margin-bottom: 36px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: #f97316; color: white;
      padding: 14px 28px; border-radius: 12px;
      font-size: 15px; font-weight: 700;
      text-decoration: none; transition: all 0.3s ease;
      box-shadow: 0 4px 20px rgba(249,115,22,0.4);
      margin: 6px;
    }
    .btn:hover { background: #ea580c; transform: translateY(-2px); box-shadow: 0 8px 30px rgba(249,115,22,0.5); }
    .btn-outline {
      background: rgba(255,255,255,0.12);
      color: white; border: 1px solid rgba(255,255,255,0.3);
      box-shadow: none;
    }
    .btn-outline:hover { background: rgba(255,255,255,0.2); box-shadow: none; }
    .store-name { font-family: 'Poppins', sans-serif; font-size: 15px; font-weight: 700; color: #86efac; margin-top: 32px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">💊</div>
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>
      Oops! The page you're looking for doesn't exist.<br>
      Let's get you back to affordable generic medicines.
    </p>
    <div>
      <a href="/" class="btn">🏠 Back to Store</a>
      <a href="/#contact" class="btn btn-outline">📍 Find Us</a>
    </div>
    <div class="store-name">💊 Janaushadhi Store · Ajwa Road, Vadodara</div>
  </div>
</body>
</html>
